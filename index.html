<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: Tahoma, 'Segoe UI', sans-serif; direction: rtl; background: #F7F8FC; min-height: 100vh; font-size: 14px; }
.header { background: #1E2A4A; color: #fff; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }

.btn { padding: 8px 13px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; }
.btn-primary { background: #6B7FD7; color: #fff; }

.btn-light { background: #eee; color: #333; }
.btn-blue-light { background: #EEF0FC; color: #6B7FD7; }

.content { padding: 16px 16px 90px; max-width: 640px; margin: 0 auto; }
.stage-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 18px; }

.sort-bar { display: flex; gap: 6px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }

.sort-btn { padding: 4px 10px; border-radius: 20px; border: none; font-size: 12px; cursor: pointer; font-family: inherit; }
.case-card { background: #fff; border-radius: 12px; padding: 13px 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; box-shadow: 0 1px 6px rgba(0,0,0,0.06); margin-bottom: 9px; border-right: 4px solid #ccc; }

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCyI27I02I7-iFWnIa2mvDB1Qd3Sfr4IUs",
    authDomain: "parvande-ai.firebaseapp.com",
    projectId: "parvande-ai",
    storageBucket: "parvande-ai.firebasestorage.app",
    messagingSenderId: "329989899571",
    appId: "1:329989899571:web:6c3c2706685e36fcbcea46"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Save to Firestore
  window.saveToCloud = async function(key, value) {
    try {
      await setDoc(doc(db, "data", key), { value: value, updatedAt: new Date().toISOString() });
    } catch(e) { console.error("Cloud save error:", e); }
  };

  // Load from Firestore
  window.loadFromCloud = async function(key) {
    try {
      const snap = await getDoc(doc(db, "data", key));
      if(snap.exists()) return snap.data().value;
    } catch(e) { console.error("Cloud load error:", e); }
    return null;
  };

  // Listen for realtime changes
  window.listenToCloud = function(key, callback) {
    return onSnapshot(doc(db, "data", key), (snap) => {
      if(snap.exists()) callback(snap.data().value);
    });
  };

  window.firebaseReady = true;
  document.dispatchEvent(new Event("firebaseReady"));
</script>

<script>
const CASE_TYPES = ["تعیین تکلیف","پارسی پست","بنیادی","تفکیک","تجمیع","اصلاحی","ماده ۴۵","آزاد"];
const DEFAULT_LAWYERS = ["عباس","آرین","مهسا","عیسی‌زاده","فلاح","داود","محمد غفاری","بور","قماشی"];
const COLORS = [
  {color:"#6B7FD7",bg:"#EEF0FC"},{color:"#4A6FE3",bg:"#E8EDFD"},
  {color:"#2AA8C4",bg:"#E6F6FA"},{color:"#3BBB8C",bg:"#E8F8F2"},
  {color:"#5BAD6F",bg:"#EAF6EC"},{color:"#A8C43A",bg:"#F3F9E0"},
  {color:"#E8A838",bg:"#FEF6E4"},{color:"#F0762A",bg:"#FEF0E6"},
  {color:"#E8604A",bg:"#FDEEE9"},{color:"#D94F7A",bg:"#FCEAF2"},
  {color:"#9B6BE8",bg:"#F3EDFD"},{color:"#C44AC4",bg:"#F9EAF9"},
  {color:"#E84A8C",bg:"#FDEAF3"},{color:"#E8A0C4",bg:"#FDF0F7"},
  {color:"#7A5C3A",bg:"#F5EFE8"},{color:"#5C7A5C",bg:"#EAF0EA"},
  {color:"#3A5C7A",bg:"#E8EFF5"},{color:"#888888",bg:"#F2F2F2"},
  {color:"#555555",bg:"#EBEBEB"},{color:"#C4A84A",bg:"#FAF4E0"},
];
const DEFAULT_STAGES = [
  {id:"received",label:"دریافت مدارک",color:"#6B7FD7",bg:"#EEF0FC"},
  {id:"review",label:"بررسی و کارشناسی",color:"#E8A838",bg:"#FEF6E4"},
  {id:"deed",label:"تنظیم سند",color:"#9B6BE8",bg:"#F3EDFD"},
  {id:"paid",label:"دریافت حق‌الزحمه",color:"#3BBB8C",bg:"#E8F8F2"},
];

let cases=[], stages=[], lawyersList=[], typesList=[];
let currentView="board", filterStageId=null, selectedId=null;
let currentTab="home"; // home | cases | lawyers | finance | backup
let lawyerFilter=null;
let sortBy="date", searchVisible=false;
let editingStages=[], newTypeSelected=[], editTypeSelected=[];
let editingCaseId=null;

let syncUnsubscribe = null;

function load() {
  // Load from localStorage first (instant)
  try { cases=JSON.parse(localStorage.getItem("pv-cases")||"[]"); } catch { cases=[]; }
  try { stages=JSON.parse(localStorage.getItem("pv-stages")||"null")||DEFAULT_STAGES; } catch { stages=DEFAULT_STAGES; }
  try { lawyersList=JSON.parse(localStorage.getItem("pv-lawyers")||"null")||DEFAULT_LAWYERS; } catch { lawyersList=DEFAULT_LAWYERS; }
  try { typesList=JSON.parse(localStorage.getItem("pv-types")||"null")||CASE_TYPES; } catch { typesList=CASE_TYPES; }
  
  // Then sync from cloud
  loadCloud();
}

async function loadCloud() {
  if(!window.firebaseReady) {
    document.addEventListener("firebaseReady", loadCloud, {once:true});
    return;
  }
  try {
    showSyncStatus("در حال بارگذاری از ابر...");
    const cloudCases = await window.loadFromCloud("cases");
    const cloudStages = await window.loadFromCloud("stages");
    const cloudLawyers = await window.loadFromCloud("lawyers");
    const cloudTypes = await window.loadFromCloud("types");
    if(cloudCases) { cases = JSON.parse(cloudCases); localStorage.setItem("pv-cases", cloudCases); }
    if(cloudStages) { stages = JSON.parse(cloudStages); localStorage.setItem("pv-stages", cloudStages); }
    if(cloudLawyers) { lawyersList = JSON.parse(cloudLawyers); localStorage.setItem("pv-lawyers", cloudLawyers); }
    if(cloudTypes) { typesList = JSON.parse(cloudTypes); localStorage.setItem("pv-types", cloudTypes); }
    showSyncStatus("✅ همگام‌سازی شد", 2000);
    render();
    
    // Listen for realtime updates
    if(syncUnsubscribe) syncUnsubscribe();
    syncUnsubscribe = window.listenToCloud("cases", (val) => {
      const newCases = JSON.parse(val);
      // Only update if different
      if(JSON.stringify(newCases) !== JSON.stringify(cases)) {
        cases = newCases;
        localStorage.setItem("pv-cases", val);
        render();
        showSyncStatus("🔄 بروزرسانی شد", 1500);
      }
    });
  } catch(e) {
    showSyncStatus("⚠️ خطا در اتصال به ابر", 3000);
  }
}

function showSyncStatus(msg, hideAfter=0) {
  let el = document.getElementById("sync-status");
  if(!el) return;
  el.textContent = msg;
  el.style.opacity = "1";
  if(hideAfter) setTimeout(()=>{ el.style.opacity="0"; }, hideAfter);
}

function saveC() {
  const val = JSON.stringify(cases);

function today() { return new Date().toISOString().split("T")[0]; }
function fmtDate(d) { if(!d) return "—"; try { return new Date(d).toLocaleDateString("fa-IR"); } catch { return d; } }
function fmtNum(n) { if(!n && n!==0) return "—"; return Number(n).toLocaleString("fa-IR"); }
function fmtPlate(c) {
  if(!c.plateFar && !c.plateAsl && !c.plateBkh) return c.plate||"—";
  return `${c.plateFar||"—"} فرعی . ${c.plateAsl||"—"} اصلی  بخش ${c.plateBkh||"—"}`;
}
function getStage(id) { return stages.find(s=>s.id===id)||stages[0]||{color:"#ccc",bg:"#eee",label:"—"}; }
function lastActiveStageId(c) {
  const ids = stages.map(s=>s.id);
  const active = c.activeStages || ids;
  for(let i=ids.length-1;i>=0;i--){ if(active.includes(ids[i])) return ids[i]; }
  return ids[ids.length-1];
}
function firstActiveStageId(c) {
  const ids = stages.map(s=>s.id);
  const active = c.activeStages || ids;
  for(let i=0;i<ids.length;i++){ if(active.includes(ids[i])) return ids[i]; }
  return ids[0];
}
function getSorted(list) {
  return [...list].sort((a,b)=>{
    if(sortBy==="name") return a.name.localeCompare(b.name,"fa");
    if(sortBy==="stage") return stages.findIndex(s=>s.id===a.stage)-stages.findIndex(s=>s.id===b.stage);
    return new Date(b.receivedDate||0)-new Date(a.receivedDate||0);
  });
}

// ── Persian month name from date string
// Gregorian to Jalali conversion
function toJalali(gy,gm,gd){
  const g_d_m=[0,31,59,90,120,151,181,212,243,273,304,334];
  let jy,jm,jd,g_y_m,gy2,days;
  gy2=gm>2?gy+1:gy;
  days=355666+(365*gy)+(Math.floor((gy2+3)/4))-(Math.floor((gy2+99)/100))+(Math.floor((gy2+399)/400))+gd+g_d_m[gm-1];
  jy=Math.floor(days/365.25)-229;
  let i=0;
  while(true){
    const jyy=jy+i;
    const ls=(((jyy-474)%2820)+474+38)*682%2816<682?1:0;
    const jdays=365+ls;
    const jstart=365*(jy+i-1)+(Math.floor(((jy+i)-474)%2820*682/2816))+ Math.floor(((jy+i)-474)/2820)*1029983+1948319.5 - 1948438.5+ Math.floor(((474+(jy+i-474)%2820)*682)/ 2816)+(jy+i-474)*365+Math.floor((jy+i)/128)-Math.floor((jy+i)/2816)+Math.floor((jy+i+474)/2820)*1029983+474*2820/682 | 0;
    if(days<jstart+jdays){jy=jy+i;break;}
    i++;
    if(i>5){jy=jy+i;break;}
  }
  // simpler approach
  let l=gy-((gm<3)?1:0); let n=474+((l-474)%2820);
  jy=l-474+(Math.floor((682*n-110)/2816))+Math.floor(n/4)*1461+n*365+Math.floor((474+(l-474)%2820)*682/2816)+(l-474-(Math.floor((474+(l-474)%2820)*682/2816))+(474+(l-474)%2820)*365+Math.floor((474+(l-474)%2820)/4)-Math.floor((474+(l-474)%2820)/100)+Math.floor((474+(l-474)%2820)/400))|0;
  // use built-in Intl instead
  return null;
}

function faMonth(dateStr) {
  if(!dateStr) return "نامشخص";
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString("fa-IR-u-nu-latn",{year:"numeric",month:"long",calendar:"persian"});
  } catch { 
    try { return d.toLocaleDateString("fa-IR",{year:"numeric",month:"long"}); }
    catch { return "نامشخص"; }
  }
}
function monthKey(dateStr) {
  if(!dateStr) return "0000-00";
  try {
    const d = new Date(dateStr);
    // Get Jalali year and month using Intl
    const parts = new Intl.DateTimeFormat("fa-IR-u-nu-latn",{year:"numeric",month:"2-digit",calendar:"persian"}).formatToParts(d);
    const yr = parts.find(p=>p.type==="year")?.value||"0";
    const mo = parts.find(p=>p.type==="month")?.value||"00";
    return `${yr}-${mo}`;
  } catch {
    const d = new Date(dateStr);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  }
}

function exportData() {
  const data = { cases, stages, exportedAt: new Date().toISOString(), version: 1 };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const dateStr = new Date().toLocaleDateString("fa-IR").replace(/\//g,"-");
  a.href = url;
  a.download = `پرونده‌ها-${dateStr}.json`;
  a.click();
  URL.revokeObjectURL(url);
  localStorage.setItem("pv-last-backup", new Date().toLocaleString("fa-IR"));
  render();
}

function importData(input, mode) {
  const file = input.files[0];
  if(!file) return;
  mode = mode || 'merge';
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if(!data.cases || !Array.isArray(data.cases)) { alert("فایل معتبر نیست"); return; }
      if(mode === 'merge') {
        const existingIds = new Set(cases.map(c=>c.id));
        const existingCodes = new Set(cases.filter(c=>c.code).map(c=>c.code));
        const newOnes = data.cases.filter(c => !existingIds.has(c.id) && !(c.code && existingCodes.has(c.code)));
        if(newOnes.length===0) { alert("هیچ پرونده جدیدی در این فایل نبود — همشون از قبل تو لیست فعلی هستن."); return; }
        if(!confirm(`${newOnes.length} پرونده جدید (از ${data.cases.length} پرونده فایل) پیدا شد. به لیست فعلی اضافه بشن؟ هیچ داده‌ای حذف یا جایگزین نمیشه.`)) return;
        cases = [...cases, ...newOnes];
        if(data.stages && Array.isArray(data.stages)) {
          const existingStageIds = new Set(stages.map(s=>s.id));
          const newStages = data.stages.filter(s=>!existingStageIds.has(s.id));
          if(newStages.length) stages = [...stages, ...newStages];
        }
      } else {
        if(!confirm(`${data.cases.length} پرونده بارگذاری بشه؟ همه داده‌های فعلی (${cases.length} پرونده) پاک و جایگزین میشن. این کار قابل بازگشت نیست مگر با یک پشتیبان دیگه.`)) return;
        cases = data.cases;
        if(data.stages && Array.isArray(data.stages)) stages = data.stages;
      }
      saveC(); saveS();
      localStorage.setItem("pv-last-backup", new Date().toLocaleString("fa-IR"));
      alert("✅ داده‌ها با موفقیت بروزرسانی شدن!");
      switchTab("cases");
    } catch(err) {
      alert("خطا در خواندن فایل: " + err.message);
    }
  };
  reader.readAsText(file);
}

          <span class="lawyer-count">${info.count} پرونده</span>

}

function renderFinance() {
  const app=document.getElementById("app");

  const totalPaid=cases.reduce((s,c)=>s+(Number(c.paid)||0),0);
  const totalRem=totalFee-totalPaid;
  const totalPartnerFee=cases.filter(c=>c.partner).reduce((s,c)=>s+Math.round((c.fee||0)*(c.partnerShare||50)/100),0);
  const totalPartnerPaid=cases.reduce((s,c)=>s+(Number(c.partnerPaid)||0),0);
  const totalMyShare=totalPaid-totalPartnerPaid;

  // Group by month of receivedDate
  const monthMap={};
  cases.forEach(c=>{
    const mk=monthKey(c.receivedDate);
    if(!monthMap[mk]) monthMap[mk]={label:faMonth(c.receivedDate),count:0,fee:0,paid:0,partnerPaid:0};
    monthMap[mk].count++;
    monthMap[mk].fee+=Number(c.fee)||0;
    monthMap[mk].paid+=Number(c.paid)||0;
    monthMap[mk].partnerPaid+=Number(c.partnerPaid)||0;
  });
  const months=Object.entries(monthMap).sort((a,b)=>b[0].localeCompare(a[0]));

  app.innerHTML=`

      </div>

        <div class="fin-card" style="border-top:3px solid #9B6BE8">
          <div class="fin-amount" style="color:#9B6BE8;font-size:13px">${fmtNum(totalPartnerFee)}</div>
          <div class="fin-label">سهم سیاوش (کل)</div>
        </div>
        <div class="fin-card" style="border-top:3px solid #E8A838">
          <div class="fin-amount" style="color:#E8A838;font-size:13px">${fmtNum(totalPartnerPaid)}</div>
          <div class="fin-label">پرداخت به سیاوش</div>

      <div class="card" style="margin-bottom:16px">
        <div class="card-title">حق‌الزحمه هر پرونده</div>
        ${cases.length===0?'<div style="color:#aaa;font-size:13px;text-align:center;padding:10px">پرونده‌ای ثبت نشده</div>':cases.map(c=>`
          <div class="fin-case-row">
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:600;color:#1E2A4A">${c.name}</div>
              <div style="font-size:11px;color:#aaa">${c.lawyer||""} ${c.type?'· '+c.type:''}</div>

      <div style="font-weight:700;font-size:14px;color:#1E2A4A;margin-bottom:10px;margin-top:8px">گزارش ماهانه</div>
      ${months.length===0?'<div class="empty" style="margin-top:20px">اطلاعات ماهانه‌ای یافت نشد</div>':months.map(([mk,m])=>`

function addPaymentLawyer(caseId) {
  const inp = document.getElementById("lawyer-add-pay-"+caseId);

function moveStage(caseId,dir){
  const ids=stages.map(s=>s.id);
  cases=cases.map(c=>{
    if(c.id!==caseId) return c;
    const active = c.activeStages || ids;
    let idx=ids.indexOf(c.stage);
    let ni = idx;
    // Skip inactive stages
    do {
      ni += dir;
      if(ni < 0 || ni >= ids.length) { ni = Math.max(0, Math.min(ni, ids.length-1)); break; }
    } while(!active.includes(ids[ni]) && ni > 0 && ni < ids.length-1);
    if(!active.includes(ids[ni])) {
      // find nearest active stage in that direction
      let found = -1;
      for(let i=ni; dir>0 ? i<ids.length : i>=0; i+=dir) {
        if(active.includes(ids[i])) { found=i; break; }
      }
      if(found>=0) ni=found; else return c;
    }
    const ns=ids[ni];
    const isLastStage = ns === lastActiveStageId(c);
    const updated = {...c,stage:ns,logs:[...c.logs,{date:today(),text:`مرحله تغییر کرد: ${getStage(ns).label}`}]};
    if(isLastStage && !c.archivedAt) {
      updated.archivedAt = today();
      delete updated.stalledAt;
    } else if(!isLastStage && c.archivedAt) {
      // moved back out of last stage - unarchive
      delete updated.archivedAt;
    }
    return updated;
  });
  saveC();render();
}

function toggleSubStage(caseId, stageId, subName, isChecked) {
  cases = cases.map(c => {
    if(c.id !== caseId) return c;
    const allSel = c.subStageSelections || {};
    let stageSel = allSel[stageId] || [];
    if(isChecked) { if(!stageSel.includes(subName)) stageSel = [...stageSel, subName]; }
    else { stageSel = stageSel.filter(s => s !== subName); }
    return {...c, subStageSelections: {...allSel, [stageId]: stageSel}};
  });
  saveC();
  render();
}

function toggleCaseStage(caseId, stageId, isActive) {
  cases = cases.map(c => {
    if(c.id !== caseId) return c;
    let active = c.activeStages || stages.map(s=>s.id);
    if(isActive) { if(!active.includes(stageId)) active = [...active, stageId]; }
    else { active = active.filter(s => s !== stageId); }
    return {...c, activeStages: active};
  });
  saveC();
  render();
}

function getJalaliYear() {
  try {
    const parts = new Intl.DateTimeFormat("fa-IR-u-nu-latn",{year:"2-digit",calendar:"persian"}).formatToParts(new Date());
    return parts.find(p=>p.type==="year")?.value||"05";
  } catch { return "05"; }
}

function generateNextCode() {
  const yr = getJalaliYear();
  const prefix = `${yr}-`;
  const nums = cases
    .map(c => c.code||"")
    .filter(c => c.startsWith(prefix))
    .map(c => parseInt(c.replace(prefix,""))||0)
    .filter(n => !isNaN(n));
  const max = nums.length > 0 ? Math.max(...nums) : 0;
  const next = String(max + 1).padStart(3, "0");
  return `${prefix}${next}`;
}

function renderArchive() {
  const app = document.getElementById("app");
  const archived = cases.filter(c=>c.archivedAt);
  // Group by Jalali year
  const yearMap = {};
  archived.forEach(c => {
    let yr = "نامشخص";
    try {
      const parts = new Intl.DateTimeFormat("fa-IR-u-nu-latn",{year:"numeric",calendar:"persian"}).formatToParts(new Date(c.archivedAt));
      yr = parts.find(p=>p.type==="year")?.value || "نامشخص";
    } catch {}
    if(!yearMap[yr]) yearMap[yr] = [];
    yearMap[yr].push(c);
  });
  const years = Object.keys(yearMap).sort((a,b)=>b.localeCompare(a));
  years.forEach(y => yearMap[y].sort((a,b)=> new Date(b.archivedAt) - new Date(a.archivedAt)));

  app.innerHTML = `
    <div class="header">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn btn-ghost" onclick="switchTab('cases')">← برگشت</button>

    </div>
    <div class="content">
      ${years.length===0?'<div class="empty">هنوز پرونده‌ای بایگانی نشده.</div>':years.map(y=>`
        <div style="font-weight:700;font-size:15px;color:#1E2A4A;margin:14px 0 8px">سال ${y}</div>

}
