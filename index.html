<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>مدیریت پرونده‌ها</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: Tahoma, 'Segoe UI', sans-serif; direction: rtl; background: #F7F8FC; min-height: 100vh; font-size: 14px; }
.header { background: #1E2A4A; color: #fff; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.header-title { font-size: 17px; font-weight: 700; }
.header-btns { display: flex; gap: 7px; align-items: center; }
.btn { padding: 8px 13px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; }
.btn-primary { background: #6B7FD7; color: #fff; }
.btn-ghost { background: rgba(255,255,255,0.15); color: #fff; }
.btn-light { background: #eee; color: #333; }
.btn-blue-light { background: #EEF0FC; color: #6B7FD7; }
.btn-danger-light { background: #FEE8E8; color: #E05C5C; }
.btn-green { background: #E8F8F2; color: #3BBB8C; }
.content { padding: 16px 16px 90px; max-width: 640px; margin: 0 auto; }
.stage-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 18px; }
.stage-card { background: #fff; border-radius: 12px; padding: 13px 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); cursor: pointer; transition: transform 0.1s; }
.stage-card:active { transform: scale(0.97); }
.stage-count { font-size: 24px; font-weight: 700; }
.stage-label { font-size: 12px; color: #777; margin-top: 3px; }
.sort-bar { display: flex; gap: 6px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.sort-label { font-size: 12px; color: #aaa; }
.sort-btn { padding: 4px 10px; border-radius: 20px; border: none; font-size: 12px; cursor: pointer; font-family: inherit; }
.case-card { background: #fff; border-radius: 12px; padding: 13px 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; box-shadow: 0 1px 6px rgba(0,0,0,0.06); margin-bottom: 9px; border-right: 4px solid #ccc; }
.case-card:active { opacity: 0.85; }
.case-name { font-weight: 700; font-size: 15px; color: #1E2A4A; }
.case-meta { font-size: 11px; color: #999; margin-top: 3px; display: flex; gap: 7px; flex-wrap: wrap; }
.case-badge { border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 600; white-space: nowrap; margin-right: 8px; flex-shrink: 0; }
.card { background: #fff; border-radius: 16px; padding: 16px 18px; box-shadow: 0 1px 8px rgba(0,0,0,0.07); margin-bottom: 12px; }
.card-title { font-size: 12px; color: #888; margin-bottom: 10px; }
label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; margin-top: 10px; }
label:first-child { margin-top: 0; }
input[type=text], input[type=date], input[type=number] { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1.5px solid #DDE2EE; font-size: 14px; font-family: inherit; direction: rtl; outline: none; }
.type-btns { display: flex; gap: 5px; margin-bottom: 4px; flex-wrap: wrap; }
.type-btn { padding: 6px 8px; border-radius: 8px; border: 2px solid #DDE2EE; background: #fff; color: #555; cursor: pointer; font-size: 11px; font-family: inherit; white-space: nowrap; }
.type-btn.active { border-color: #6B7FD7; background: #EEF0FC; color: #6B7FD7; font-weight: 700; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 22px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); max-height: 88vh; overflow-y: auto; }
.modal h3 { margin-bottom: 16px; font-size: 16px; }
.btn-row { display: flex; gap: 8px; margin-top: 14px; }
.btn-row .btn { flex: 1; }
.stage-edit-row { display: flex; gap: 6px; align-items: center; margin-bottom: 9px; background: #F7F8FC; border-radius: 10px; padding: 8px 10px; }
.stage-edit-arrows { display: flex; flex-direction: column; gap: 2px; }
.arrow-btn { background: none; border: none; cursor: pointer; font-size: 12px; padding: 1px 4px; }
.color-dots { display: flex; gap: 3px; flex-wrap: wrap; max-width: 120px; }
.color-dot { width: 16px; height: 16px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
.color-dot.active { border-color: #333; }
.search-bar { background: #fff; padding: 12px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.stage-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.stage-pill { padding: 5px 11px; border-radius: 20px; font-size: 12px; border: 2px solid; }
.log-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 7px; }
.log-date { font-size: 10px; color: #bbb; white-space: nowrap; padding-top: 4px; min-width: 72px; }
.log-text { font-size: 13px; color: #333; background: #F7F8FC; border-radius: 8px; padding: 6px 10px; flex: 1; }
.log-input-row { display: flex; gap: 7px; }
.log-input-row input { flex: 1; }
.plate-row { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
.plate-row input { padding: 9px 8px; border-radius: 8px; border: 1.5px solid #DDE2EE; font-size: 13px; font-family: inherit; direction: ltr; text-align: center; outline: none; min-width: 0; }
.plate-dot { font-size: 12px; color: #888; white-space: nowrap; flex-shrink: 0; }
.check-row { display: flex; gap: 16px; padding: 6px 0; }
.check-label { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #333; cursor: pointer; }
.check-label input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: #6B7FD7; }
.detail-info-row { display: flex; justify-content: space-between; align-items: flex-start; }
.detail-name { font-size: 18px; font-weight: 700; color: #1E2A4A; margin-bottom: 6px; }
.detail-meta { font-size: 12px; color: #888; display: flex; flex-direction: column; gap: 3px; }
.detail-meta strong { color: #1E2A4A; }
.action-btns { display: flex; gap: 6px; }
.empty { text-align: center; color: #aaa; margin-top: 50px; font-size: 14px; }
.loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #888; }
.move-btns { display: flex; gap: 8px; margin-top: 12px; }
.move-btns .btn { flex: 1; }
/* Bottom nav */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #E8ECF4; display: flex; z-index: 40; }
.nav-btn { flex: 1; padding: 10px 4px 12px; border: none; background: none; cursor: pointer; font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; color: #aaa; }
.nav-btn.active { color: #6B7FD7; }
.nav-icon { font-size: 20px; }
/* Lawyer page */
.lawyer-card { background: #fff; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.lawyer-card:active { opacity: 0.85; }
.lawyer-name { font-weight: 700; font-size: 15px; color: #1E2A4A; }
.lawyer-count { font-size: 12px; color: #6B7FD7; background: #EEF0FC; border-radius: 20px; padding: 3px 10px; font-weight: 600; }
/* Finance page */
.finance-summary { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
.fin-card { background: #fff; border-radius: 12px; padding: 13px 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); text-align: center; }
.fin-amount { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.fin-label { font-size: 11px; color: #aaa; }
.month-card { background: #fff; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); margin-bottom: 10px; }
.month-title { font-weight: 700; font-size: 14px; color: #1E2A4A; margin-bottom: 8px; }
.month-row { display: flex; justify-content: space-between; font-size: 12px; color: #666; padding: 3px 0; }
.month-row span:last-child { font-weight: 600; color: #1E2A4A; }
.fin-case-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #F0F2F8; }
.fin-case-row:last-child { border-bottom: none; }
.fin-input { width: 110px; padding: 6px 8px; border-radius: 8px; border: 1.5px solid #DDE2EE; font-size: 13px; font-family: inherit; direction: rtl; text-align: left; outline: none; }
</style>
</head>
<body>
<div id="app"><div class="loading">در حال بارگذاری...</div></div>

<!-- New Case Modal -->
<div class="modal-overlay" id="modal-new">
  <div class="modal">
    <h3>ثبت پرونده جدید</h3>
    <label>وکیل</label>
    <input type="text" id="new-lawyer" placeholder="نام وکیل">
    <label>پلاک ملک</label>
    <div class="plate-row">
      <input type="text" id="new-plate-far" placeholder="فرعی" style="flex:1">
      <span class="plate-dot">.</span>
      <input type="text" id="new-plate-asl" placeholder="اصلی" style="flex:1.2">
      <span class="plate-dot">بخش</span>
      <input type="text" id="new-plate-bkh" placeholder="" style="flex:0.8">
    </div>
    <label>مساحت (متر مربع)</label>
    <input type="number" id="new-area" placeholder="مثلاً ۱۲۰">
    <label>نوع</label>
    <div class="type-btns" id="new-type-btns"></div>
    <label>نام موکل *</label>
    <input type="text" id="new-name" placeholder="نام و نام خانوادگی">
    <label>تاریخ دریافت</label>
    <input type="date" id="new-date">
    <label style="margin-top:12px">اولویت</label>
    <div class="check-row">
      <label class="check-label"><input type="checkbox" id="new-check-urgent"> 🔴 فوری</label>
      <label class="check-label"><input type="checkbox" id="new-check-hard"> ⚡ سخت</label>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addCase()">ثبت</button>

</div>

<!-- Edit Case Modal -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <h3>ویرایش پرونده</h3>
    <label>وکیل</label>
    <input type="text" id="edit-lawyer">
    <label>پلاک ملک</label>
    <div class="plate-row">
      <input type="text" id="edit-plate-far" placeholder="فرعی" style="flex:1">
      <span class="plate-dot">.</span>
      <input type="text" id="edit-plate-asl" placeholder="اصلی" style="flex:1.2">
      <span class="plate-dot">بخش</span>
      <input type="text" id="edit-plate-bkh" placeholder="" style="flex:0.8">
    </div>
    <label>مساحت (متر مربع)</label>
    <input type="number" id="edit-area" placeholder="مثلاً ۱۲۰">
    <label>نوع</label>
    <div class="type-btns" id="edit-type-btns"></div>
    <label>نام موکل</label>
    <input type="text" id="edit-name">
    <label>تاریخ دریافت</label>
    <input type="date" id="edit-date">
    <label style="margin-top:12px">اولویت</label>
    <div class="check-row">
      <label class="check-label"><input type="checkbox" id="edit-check-urgent"> 🔴 فوری</label>
      <label class="check-label"><input type="checkbox" id="edit-check-hard"> ⚡ سخت</label>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveEditCase()">ذخیره</button>
      <button class="btn btn-light" onclick="closeModal('modal-edit')">انصراف</button>
    </div>
  </div>
</div>

<!-- Stage Editor Modal -->
<div class="modal-overlay" id="modal-stage">
  <div class="modal">
    <h3>ویرایش مراحل</h3>
    <div id="stage-editor-list"></div>
    <button class="btn btn-blue-light" style="width:100%;margin-top:4px" onclick="addNewStage()">+ افزودن مرحله</button>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveStages()">ذخیره</button>
      <button class="btn btn-light" onclick="closeModal('modal-stage')">انصراف</button>
    </div>
  </div>
</div>

<script>
const CASE_TYPES = ["تعیین تکلیف","پارسی پست","بنیادی","تفکیک","تجمیع","اصلاحی","ماده ۴۵","آزاد"];
const COLORS = [
  {color:"#6B7FD7",bg:"#EEF0FC"},{color:"#4A6FE3",bg:"#E8EDFD"},
  {color:"#2AA8C4",bg:"#E6F6FA"},{color:"#3BBB8C",bg:"#E8F8F2"},
  {color:"#5BAD6F",bg:"#EAF6EC"},{color:"#A8C43A",bg:"#F3F9E0"},
  {color:"#E8A838",bg:"#FEF6E4"},{color:"#F0762A",bg:"#FEF0E6"},
  {color:"#E8604A",bg:"#FDEEE9"},{color:"#D94F7A",bg:"#FCEAF2"},
  {color:"#9B6BE8",bg:"#F3EDFD"},{color:"#C44AC4",bg:"#F9EAF9"},
  {color:"#E84A8C",bg:"#FDEAF3"},{color:"#E8A0C4",bg:"#FDF0F7"},
  {color:"#7A5C3A",bg:"#F5EFE8"},{color:"#5C7A5C",bg:"#EAF0EA"},
  {color:"#3A5C7A",bg:"#E8EFF5"},{color:"#888888",bg:"#F2F2F2"},
  {color:"#555555",bg:"#EBEBEB"},{color:"#C4A84A",bg:"#FAF4E0"},
];
const DEFAULT_STAGES = [
  {id:"received",label:"دریافت مدارک",color:"#6B7FD7",bg:"#EEF0FC"},
  {id:"review",label:"بررسی و کارشناسی",color:"#E8A838",bg:"#FEF6E4"},
  {id:"deed",label:"تنظیم سند",color:"#9B6BE8",bg:"#F3EDFD"},
  {id:"paid",label:"دریافت حق‌الزحمه",color:"#3BBB8C",bg:"#E8F8F2"},
];

let cases=[], stages=[];
let currentView="board", filterStageId=null, selectedId=null;
let currentTab="cases"; // cases | lawyers | finance
let lawyerFilter=null;
let sortBy="date", searchVisible=false;
let editingStages=[], newTypeSelected="", editTypeSelected="";
let editingCaseId=null;

function load() {
  try { cases=JSON.parse(localStorage.getItem("pv-cases")||"[]"); } catch { cases=[]; }
  try { stages=JSON.parse(localStorage.getItem("pv-stages")||"null")||DEFAULT_STAGES; } catch { stages=DEFAULT_STAGES; }
}
function saveC() { localStorage.setItem("pv-cases",JSON.stringify(cases)); }
function saveS() { localStorage.setItem("pv-stages",JSON.stringify(stages)); }

function today() { return new Date().toISOString().split("T")[0]; }
function fmtDate(d) { if(!d) return "—"; try { return new Date(d).toLocaleDateString("fa-IR"); } catch { return d; } }
function fmtNum(n) { if(!n && n!==0) return "—"; return Number(n).toLocaleString("fa-IR"); }
function fmtPlate(c) {
  if(!c.plateFar && !c.plateAsl && !c.plateBkh) return c.plate||"—";
  return `${c.plateFar||"—"} فرعی . ${c.plateAsl||"—"} اصلی  بخش ${c.plateBkh||"—"}`;
}
function getStage(id) { return stages.find(s=>s.id===id)||stages[0]||{color:"#ccc",bg:"#eee",label:"—"}; }
function getSorted(list) {
  return [...list].sort((a,b)=>{
    if(sortBy==="name") return a.name.localeCompare(b.name,"fa");
    if(sortBy==="stage") return stages.findIndex(s=>s.id===a.stage)-stages.findIndex(s=>s.id===b.stage);
    return new Date(b.receivedDate||0)-new Date(a.receivedDate||0);
  });
}

// ── Persian month name from date string
// Gregorian to Jalali conversion
function toJalali(gy,gm,gd){
  const g_d_m=[0,31,59,90,120,151,181,212,243,273,304,334];
  let jy,jm,jd,g_y_m,gy2,days;
  gy2=gm>2?gy+1:gy;
  days=355666+(365*gy)+(Math.floor((gy2+3)/4))-(Math.floor((gy2+99)/100))+(Math.floor((gy2+399)/400))+gd+g_d_m[gm-1];
  jy=Math.floor(days/365.25)-229;
  let i=0;
  while(true){
    const jyy=jy+i;
    const ls=(((jyy-474)%2820)+474+38)*682%2816<682?1:0;
    const jdays=365+ls;
    const jstart=365*(jy+i-1)+(Math.floor(((jy+i)-474)%2820*682/2816))+ Math.floor(((jy+i)-474)/2820)*1029983+1948319.5 - 1948438.5+ Math.floor(((474+(jy+i-474)%2820)*682)/ 2816)+(jy+i-474)*365+Math.floor((jy+i)/128)-Math.floor((jy+i)/2816)+Math.floor((jy+i+474)/2820)*1029983+474*2820/682 | 0;
    if(days<jstart+jdays){jy=jy+i;break;}
    i++;
    if(i>5){jy=jy+i;break;}
  }
  // simpler approach
  let l=gy-((gm<3)?1:0); let n=474+((l-474)%2820);
  jy=l-474+(Math.floor((682*n-110)/2816))+Math.floor(n/4)*1461+n*365+Math.floor((474+(l-474)%2820)*682/2816)+(l-474-(Math.floor((474+(l-474)%2820)*682/2816))+(474+(l-474)%2820)*365+Math.floor((474+(l-474)%2820)/4)-Math.floor((474+(l-474)%2820)/100)+Math.floor((474+(l-474)%2820)/400))|0;
  // use built-in Intl instead
  return null;
}

function faMonth(dateStr) {
  if(!dateStr) return "نامشخص";
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString("fa-IR-u-nu-latn",{year:"numeric",month:"long",calendar:"persian"});
  } catch { 
    try { return d.toLocaleDateString("fa-IR",{year:"numeric",month:"long"}); }
    catch { return "نامشخص"; }
  }
}
function monthKey(dateStr) {
  if(!dateStr) return "0000-00";
  try {
    const d = new Date(dateStr);
    // Get Jalali year and month using Intl
    const parts = new Intl.DateTimeFormat("fa-IR-u-nu-latn",{year:"numeric",month:"2-digit",calendar:"persian"}).formatToParts(d);
    const yr = parts.find(p=>p.type==="year")?.value||"0";
    const mo = parts.find(p=>p.type==="month")?.value||"00";
    return `${yr}-${mo}`;
  } catch {
    const d = new Date(dateStr);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  }
}

function caseCardHTML(c) {
  const s = getStage(c.stage);
  return `<div class="case-card" style="border-right-color:${c.urgent?'#E05C5C':s.color};${c.urgent?'background:#FFF8F8':''}" onclick="openCase('${c.id}')">
    <div style="flex:1;min-width:0">
      <div class="case-name">${c.name}</div>
      <div class="case-meta">
        ${c.lawyer?`<span>👤 ${c.lawyer}</span>`:""}
        ${c.type?`<span>📋 ${c.type}</span>`:""}
        <span>🏠 ${fmtPlate(c)}</span>
        ${c.area?`<span>📐 ${fmtNum(c.area)} م²</span>`:""}
        <span>📅 ${fmtDate(c.receivedDate)}</span>
        ${c.urgent?`<span style="color:#E05C5C;font-weight:700">🔴 فوری</span>`:""}
        ${c.hard?`<span style="color:#E8A838;font-weight:700">⚡ سخت</span>`:""}
      </div>
    </div>
    <div class="case-badge" style="background:${s.bg};color:${s.color}">${s.label}</div>
  </div>`;
}

function bottomNav() {
  return `<div class="bottom-nav">
    <button class="nav-btn ${currentTab==='cases'?'active':''}" onclick="switchTab('cases')"><span class="nav-icon">📁</span>پرونده‌ها</button>
    <button class="nav-btn ${currentTab==='lawyers'?'active':''}" onclick="switchTab('lawyers')"><span class="nav-icon">👤</span>وکلا</button>
    <button class="nav-btn ${currentTab==='finance'?'active':''}" onclick="switchTab('finance')"><span class="nav-icon">💰</span>مالی</button>
    <button class="nav-btn ${currentTab==='backup'?'active':''}" onclick="switchTab('backup')"><span class="nav-icon">☁️</span>پشتیبان</button>
  </div>`;
}

// ── Backup Tab
function renderBackup() {
  const app=document.getElementById("app");
  const lastSave = localStorage.getItem("pv-last-backup")||"ذخیره نشده";
  app.innerHTML=`
    <div class="header">
      <div class="header-title">☁️ پشتیبان‌گیری</div>
    </div>
    <div class="content">
      <div class="card" style="text-align:center;padding:24px 18px">
        <div style="font-size:40px;margin-bottom:12px">💾</div>
        <div style="font-weight:700;font-size:16px;color:#1E2A4A;margin-bottom:6px">خروجی گرفتن از داده‌ها</div>
        <div style="font-size:12px;color:#aaa;margin-bottom:16px">فایل JSON دانلود میشه — روی لپتاپ یا گوشی دیگه import کن</div>
        <div style="font-size:11px;color:#bbb;margin-bottom:16px">آخرین پشتیبان: ${lastSave}</div>
        <button class="btn btn-primary" style="width:100%;padding:12px" onclick="exportData()">📥 دانلود فایل پشتیبان</button>
      </div>

      <div class="card" style="text-align:center;padding:24px 18px">
        <div style="font-size:40px;margin-bottom:12px">📂</div>

function exportData() {
  const data = { cases, stages, exportedAt: new Date().toISOString(), version: 1 };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const dateStr = new Date().toLocaleDateString("fa-IR").replace(/\//g,"-");
  a.href = url;
  a.download = `پرونده‌ها-\${dateStr}.json`;
  a.click();
  URL.revokeObjectURL(url);
  localStorage.setItem("pv-last-backup", new Date().toLocaleString("fa-IR"));
  render();
}

function importData(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if(!data.cases || !Array.isArray(data.cases)) { alert("فایل معتبر نیست"); return; }
      if(!confirm(`\${data.cases.length} پرونده بارگذاری بشه؟ داده‌های فعلی جایگزین میشن.`)) return;
      cases = data.cases;
      if(data.stages && Array.isArray(data.stages)) stages = data.stages;
      saveC(); saveS();
      localStorage.setItem("pv-last-backup", new Date().toLocaleString("fa-IR"));
      alert("✅ داده‌ها با موفقیت بازگردانی شدن!");
      switchTab("cases");
    } catch(err) {
      alert("خطا در خواندن فایل: " + err.message);
    }
  };
  reader.readAsText(file);
}

function switchTab(tab) {
  currentTab=tab; currentView="board"; filterStageId=null; selectedId=null; lawyerFilter=null; searchVisible=false;
  render();
}

function render() {
  const app = document.getElementById("app");

  if(currentTab==="finance") { renderFinance(); return; }

  renderCases();
}

  // Build lawyers list

function updateFee(caseId, val, field) {
  cases=cases.map(c=>c.id===caseId?{...c,[field]:Number(val)||0}:c);
  saveC();
}

function renderSearch() {
  const q=(document.getElementById("search-input")||{}).value||"";
  const res=document.getElementById("search-results");
  if(!res) return;
  if(!q.trim()){res.innerHTML="";return;}
  const found=cases.filter(c=>c.name.includes(q)||(c.lawyer||"").includes(q)||(c.plateFar||"").includes(q)||(c.plateAsl||"").includes(q)||(c.type||"").includes(q));
  if(found.length===0){res.innerHTML='<div style="color:#aaa;font-size:13px;text-align:center;padding:10px">نتیجه‌ای یافت نشد</div>';return;}
  res.innerHTML=found.map(c=>`<div onclick="openCaseFromSearch('${c.id}')">${caseCardHTML(c)}</div>`).join("");
}

function openCaseFromSearch(id){searchVisible=false;openCase(id);}
function toggleSearch(){searchVisible=!searchVisible;render();}
function setSort(k){sortBy=k;render();}
function goBoard(){currentView="board";filterStageId=null;selectedId=null;render();}
function openStageFilter(id){filterStageId=id;currentView="stageFilter";render();}
function openCase(id){currentTab="cases";selectedId=id;currentView="detail";render();}

function moveStage(caseId,dir){
  const ids=stages.map(s=>s.id);
  cases=cases.map(c=>{
    if(c.id!==caseId) return c;
    const idx=ids.indexOf(c.stage);
    const ni=Math.min(Math.max(idx+dir,0),ids.length-1);
    const ns=ids[ni];
    return {...c,stage:ns,logs:[...c.logs,{date:today(),text:`مرحله تغییر کرد: ${getStage(ns).label}`}]};
  });
  saveC();render();
}

function addLog(caseId){
  const inp=document.getElementById("log-input");
  const txt=(inp||{}).value||"";
  if(!txt.trim()) return;
  cases=cases.map(c=>c.id===caseId?{...c,logs:[...c.logs,{date:today(),text:txt.trim()}]}:c);
  saveC();render();
}

function deleteCase(caseId){
  if(!confirm("آیا مطمئنید؟")) return;
  cases=cases.filter(c=>c.id!==caseId);
  saveC();goBoard();
}

  newTypeSelected="";
  ["new-name","new-lawyer","new-plate-far","new-plate-asl","new-plate-bkh","new-area"].forEach(id=>document.getElementById(id).value="");

function renderTypeBtns(containerId,prefix){

  const c={
    id:Date.now().toString(),

    plateFar:document.getElementById("new-plate-far").value.trim(),
    plateAsl:document.getElementById("new-plate-asl").value.trim(),
    plateBkh:document.getElementById("new-plate-bkh").value.trim(),

  editTypeSelected=c.type||"";
  document.getElementById("edit-name").value=c.name;
  document.getElementById("edit-lawyer").value=c.lawyer||"";
  document.getElementById("edit-plate-far").value=c.plateFar||"";
  document.getElementById("edit-plate-asl").value=c.plateAsl||"";
  document.getElementById("edit-plate-bkh").value=c.plateBkh||"";
  document.getElementById("edit-area").value=c.area||"";
  document.getElementById("edit-date").value=c.receivedDate||today();
  document.getElementById("edit-check-urgent").checked=c.urgent||false;
  document.getElementById("edit-check-hard").checked=c.hard||false;

    </div>`).join("");
}
function moveEditStage(i,dir){const j=i+dir;if(j<0||j>=editingStages.length)return;[editingStages[i],editingStages[j]]=[editingStages[j],editingStages[i]];renderStageEditor();}
function removeEditStage(i){editingStages.splice(i,1);renderStageEditor();}
function setStageColor(i,c,b){editingStages[i].color=c;editingStages[i].bg=b;renderStageEditor();}
function addNewStage(){editingStages.push({id:Date.now().toString(),label:"مرحله جدید",color:COLORS[0].color,bg:COLORS[0].bg});renderStageEditor();}
function saveStages(){stages=editingStages.filter(s=>s.label.trim());saveS();closeModal("modal-stage");render();}

function openModal(id){document.getElementById(id).classList.add("open");}
function closeModal(id){document.getElementById(id).classList.remove("open");}
document.querySelectorAll(".modal-overlay").forEach(el=>{
  el.addEventListener("click",function(e){if(e.target===this)this.classList.remove("open");});
});

load();render();
</script>
</body>
